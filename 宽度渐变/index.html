<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box {
            position: relative;
            width: 300px;
            height: 50px;
            .over {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: black;
                animation: widthAn 2s linear infinite;
            }
        }
        @keyframes widthAn {
            100% {
                left: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="over"></div>
    </div>
</body>
</html>
