<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    /* css变量 */
    :root {
      --radius: 16px;
      --borderWidth: 1px
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    table {
      border-collapse: separate;
      border-spacing: 0;
      border-radius: var(--radius);
      border: solid 1px #dfdfdf;
    }
    th {
      background-color: #876AFF;
    }
    th,td {
      padding: 20px;
      text-align: center;
      line-height: 100%;
    }
    tr:nth-child(even)>td {
      background-color: #ECE7FE;
    }
    tr:first-child>th:first-child {
      border-radius: calc(var(--radius) - var(--borderWidth)) 0 0 0;
    }
    tr:first-child>th:last-child {
      border-radius: 0 calc(var(--radius) - var(--borderWidth)) 0 0;
    }
    tr:last-child>td:first-child {
      border-radius: 0 0 0 calc(var(--radius) - var(--borderWidth));
    }
    tr:last-child>td:last-child {
      border-radius: 0 0 calc(var(--radius) - var(--borderWidth)) 0;
    }
    td, th {
      border-right: 1px solid #dfdfdf;
      text-align: center;
    }
    td {
      border-top: 1px solid #dfdfdf;
    }
    td:last-child, th:last-child {
      border-right: none;
    }
  </style>
</head>
<body>
    <table>
      <thead>
        <tr>
          <th>Id</th>
          <th>Name<br>NameName</th>
          <th>Age</th>
          <th>From</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>cwl</td>
          <td>1</td>
          <td colspan="1" rowspan="4">china</td>
        </tr>
        <tr>
          <td>2</td>
          <td>cwl</td>
          <td>2</td>
          <!-- <td style="display: none;" colspan="1" rowspan="1">china</td> -->
        </tr>
        <tr>
          <td>3</td>
          <td>cwl</td>
          <td>3</td>
          <!-- <td style="display: none;" colspan="1" rowspan="1">china</td> -->
        </tr>
        <tr>
          <td>4</td>
          <td>cwl</td>
          <td>4</td>
          <!-- <td style="display: none;" colspan="1" rowspan="1">china</td> -->
        </tr>
      </tbody>
    </table>
</body>
</html>
