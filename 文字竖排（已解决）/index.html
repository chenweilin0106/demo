<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 300px;
            height: 300px;
            background-color: red;
            color: #fff;
            writing-mode: vertical-rl; /* 垂直排列，从右到左 */
            text-orientation: upright; /* 文字方向保持直立 */
            font-size: 3vw;
            line-height: 1;
            font-weight: 500;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="box">缘来是你</div>
</body>
</html>
