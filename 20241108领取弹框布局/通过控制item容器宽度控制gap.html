<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通过控制item容器宽度控制gap</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ::-webkit-scrollbar {
            display: none;
            width: 0;
            -webkit-overflow-scrolling: touch;
        }
        :root {
            --colNum: 3;
            --gapNum: calc(var(--colNum) * 2 + 2);
            --listWidth: 519px;
            --listHeight: 800px;
            --itemIconSize: 128px;
            /* 每个item和list的gap都是一样的 */
            --gap: calc((var(--listWidth) - var(--itemIconSize) * var(--colNum)) / var(--gapNum));
            --itemWidth: calc(var(--itemIconSize) + 2 * var(--gap));
            --listPadding: 50px var(--gap) calc(50px - (48px - 24px - 14px)) var(--gap);

            /* 三个item之间的gap比较小 list和item的gap比较大 */
            /* --itemWidth: calc(var(--itemIconSize) + 2 * 8);
            --gap: calc((var(--listWidth) - var(--itemIconSize) * 3) / 2);
            --listPadding: 50px var(--gap);  */
        }
        .list {
            width: var(--listWidth);
            height: fit-content;
            min-height: calc(var(--itemIconSize) + 48px + 50px);
            max-height: calc((var(--itemIconSize) + 48px) * 3 + (var(--itemIconSize) + 48px) / 6  + 50px);
            overflow-y: scroll;
            overflow-x: hidden;
            display: flex;
            justify-content: center; 
            flex-wrap: wrap;
            align-content: start;
            padding: var(--listPadding);
            background-color: grey;
        } 
        .item {
            width: var(--itemWidth);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .item .top {
            width: var(--itemIconSize);
            height: var(--itemIconSize);
            background: #FFFFFF;
            border-radius: 12px;
            border: 4px solid #DBC1FF;
        }
        .item .bottom {
            width: var(--itemWidth);
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 100%;
            font-size: 28px;
            color: #FFFFFF;
        }
    </style>
</head>
<body>
    <div class="list">
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
        <div class="item">
            <div class="top"></div>
            <div class="bottom">+100</div>
        </div>
    </div>
</body>
</html>
