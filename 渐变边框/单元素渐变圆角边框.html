<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      width: 100%;
      height: 100%;
    }
    body {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    :root {
      --border-width: 4px;
      --border-radius: 20px;
    }
    .border-box {
      position: relative;
      width: 300px;
      height: 200px;
      border: var(--border-width) solid transparent;
      padding: var(--border-width);
      border-radius: var(--border-radius);
      -webkit-background-clip: padding-box, border-box, content-box;
      -webkit-background-origin: padding-box, border-box, content-box;
      background-image: -webkit-linear-gradient(orange, purple), -webkit-linear-gradient(yellow, green), -webkit-linear-gradient(red, blue);
    }
    .border-box::before {
      content: '';
      position: absolute;
      z-index: -1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: calc(100% + var(--border-width) * 2 + var(--border-width) * 2);
      height: calc(100% + var(--border-width) * 2 + var(--border-width) * 2);
      background: linear-gradient(
        45deg,
        hsl(300deg, 100%, 50%),
        hsl(200deg, 100%, 50%),
        hsl(100deg, 100%, 50%)
      );
      border-radius: calc(var(--border-radius) + var(--border-width));
    }
  </style>
</head>

<body>
  <div class="border-box"></div>
</body>

</html>
