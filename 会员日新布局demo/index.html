<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .box {
      margin: auto;
      width: 500px;
      height: 500px;
      /* background-color: #000; */
      border: 1px solid #5555;
      .left {
        float: left;
        width: 50%;
        height: 100%;
        background-color: green;
      }
        .son2 {
          float: left;
          width: 50%;
          height: 50%;
          background-color: red;
        }
        .son3 {
          float: left;
          width: 50%;
          height: 50%;
          background-color: blue;
        }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="left"></div>
      <div class="son2"></div>
      <div class="son3"></div>
  </div>
</body>
</html>
