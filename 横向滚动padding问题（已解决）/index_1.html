<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ::-webkit-scrollbar {
            display: none;
            width: 0;
            -webkit-overflow-scrolling: touch;
        }
        .scrollBox{
            position: absolute;
            width: 90vw;
            height: 300px;
            overflow-x: scroll;
            overflow-y: hidden;
            overscroll-behavior: none;
            /* display: flex; */
            /* align-items: center; */
            background-color: #f1f1f1;
            padding: 0 50px;
        }
        .container{
            position: absolute;
            /* top: 100px; */
            width: fit-content;
            height: 100px;
            background-color: skyblue;
            display: flex;
            /* justify-content: space-evenly; */
            /* padding-right: 50px; */
        }
        .item{
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            background-color: pink;
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="scrollBox">
        <div class="container">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>
            <div class="item">6</div>
            <div class="item">7</div>
        </div>
    </div>
</body>
</html>
