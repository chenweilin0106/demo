<body>
  <script>
    reloadFreeUsersData
    function reloadFreeUsersData () {
      this.timer = setTimeout(async () => {
        await this.getHomeData('m4')
        if (this.pageData.free_status == 2) {
          this.getSwiper()
          return this.clearTimer()
        }
        this.num += 1
        if (this.num > 5) return this.clearTimer()
        console.log('num', this.num)
        this.reloadFreeUsersData()
      }, 1000)
    }
  </script>
