<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG雷达图</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body{
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #1a1a1a;
      font-family: Arial, sans-serif;
    }
    
    .radar-container {
      width: 600px;
      height: 600px;
      background: grey;
      border-radius: 10px;
      padding: 20px;
    }
    
    .radar-svg {
      width: 100%;
      height: 100%;
    }
    
    /* 五边形背景样式 */
    .pentagon-bg {
      fill: rgb(254, 241, 216,0.5);
      stroke: #FBDDA7;
      stroke-width: 2;
      /* opacity: 0.8; */
    }
    
    .pentagon-bg.inner {
      fill: none;
      stroke: #FBDDA7;
      stroke-width: 1;
      /* opacity: 0.6; */
    }

    #pentagon-2 {
      fill: rgb(254, 241, 216,0.6);
    }

    #pentagon-3 {
      fill: rgb(254, 241, 216,0.7);
    }

    #pentagon-4 {
      fill: rgb(254, 241, 216,0.8);
    }
    
    /* 轴线样式 */
    .axis-line {
      stroke: #FBDDA7;
      stroke-width: 2;
      /* opacity: 0.5; */
    }
    
    /* 数据点样式 */
    .data-point {
      fill: #F1CA84;
      stroke: none;
      stroke-width: 2;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .data-point:hover {
      fill: #F5E0C0;
      transform: scale(1.2);
    }
    
    .data-point.active {
      fill: #FFD700;
    }
    
    .data-point.completed {
      fill: #32CD32;
    }
    
    .data-point.locked {
      fill: #666;
      cursor: not-allowed;
    }
    
    /* 雷达图数据区域样式（填充+连线） */
    .radar-data {
      fill: rgba(213,110,0,0.3);
      stroke: #D56E00;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
      transition: all 0.5s ease;
    }
    
    /* 控制面板 */
    .controls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }
    
    .level-control {
      margin-bottom: 10px;
    }
    
    .level-control label {
      color: #fff;
      display: block;
      margin-bottom: 5px;
    }
    
    .level-control input {
      width: 100%;
      padding: 5px;
      border: none;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="radar-container">
    <svg class="radar-svg" viewBox="0 0 800 800">
      <!-- 五边形背景网格 -->
      <g id="pentagon-background">
        <!-- 5个嵌套的正五边形 -->
        <!-- 重新计算的正五边形坐标，确保五条边长度相等 -->
        <!-- 中心点(400,400)，半径250，顶点角度：-90°, -18°, 54°, 126°, 198° -->
        <!-- 重新计算的正五边形坐标 -->
        <!-- 中心(400,400)，半径250，顶点：-90°(-π/2), -18°(-π/10), 54°(3π/10), 126°(7π/10), 198°(11π/10) -->
        <!-- 计算后的正确坐标：顶点1(-90°), 顶点2(-18°), 顶点3(54°), 顶点4(126°), 顶点5(198°) -->
        <!-- 第1层：最外层五边形（半径250） -->
        <polygon class="pentagon-bg" id="pentagon-1" fill="#fef1d8" points="400,150 637.75,322.75 547,602.25 253,602.25 162.25,322.75"/>
        
        <!-- 第2层：五边形（半径190） -->
        <polygon class="pentagon-bg inner" id="pentagon-2" points="400,210 580.69,341.29 511.64,555.71 288.36,555.71 219.31,341.29"/>
        
        <!-- 第3层：五边形（半径130） -->
        <polygon class="pentagon-bg inner" id="pentagon-3" points="400,270 523.63,359.83 476.44,505.17 323.56,505.17 276.37,359.83"/>
        
        <!-- 第4层：最内层五边形（半径70） -->
        <polygon class="pentagon-bg inner" id="pentagon-4" points="400,330 466.55,378.45 441.16,456.63 358.84,456.63 333.45,378.45"/>
      </g>
      <path id="radar-data" class="radar-data" d="M 400,270 L 523.63,359.83 L 476.44,505.17 L 323.56,505.17 L 276.37,359.83 L 400,270 L 400,270"/>
      <!-- 5条径向轴线 -->
      <g id="axes">
        <!-- 轴线1：垂直向上 -->
        <line class="axis-line" x1="400" y1="400" x2="400" y2="150"/>
        <!-- 轴线2：右上方向 -->
        <line class="axis-line" x1="400" y1="400" x2="637.75" y2="322.75"/>
        <!-- 轴线3：右下方向 -->
        <line class="axis-line" x1="400" y1="400" x2="547" y2="602.25"/>
        <!-- 轴线4：左下方向 -->
        <line class="axis-line" x1="400" y1="400" x2="253" y2="602.25"/>
        <!-- 轴线5：左上方向 -->
        <line class="axis-line" x1="400" y1="400" x2="162.25" y2="322.75"/>
      </g>
      
      <!-- 数据点 -->
      <g id="data-points">
        <!-- 轴线0：垂直向上 -->
        <circle class="data-point" cx="400" cy="400" r="9" data-axis="0" data-level="0"/>
        <circle class="data-point" cx="400" cy="330" r="9" data-axis="0" data-level="1"/>
        <circle class="data-point" cx="400" cy="270" r="9" data-axis="0" data-level="2"/>
        <circle class="data-point" cx="400" cy="210" r="9" data-axis="0" data-level="3"/>
        <circle class="data-point" cx="400" cy="150" r="9" data-axis="0" data-level="4"/>
        
        <!-- 轴线1：右上方向 -->
        <circle class="data-point" cx="400" cy="400" r="9" data-axis="1" data-level="0"/>
        <circle class="data-point" cx="466.55" cy="378.45" r="9"  data-axis="1" data-level="1"/>
        <circle class="data-point" cx="523.63" cy="359.83" r="9"  data-axis="1" data-level="2"/>
        <circle class="data-point" cx="580.69" cy="341.29" r="9" data-axis="1" data-level="3"/>
        <circle class="data-point" cx="637.75" cy="322.75" r="9" data-axis="1" data-level="4"/>
        
          <!-- 轴线2：右下方向 -->
        <circle class="data-point" cx="400" cy="400" r="9" data-axis="2" data-level="0"/>
        <circle class="data-point" cx="441.16" cy="456.63" r="9" data-axis="2" data-level="1"/>
        <circle class="data-point" cx="476.44" cy="505.17" r="9" data-axis="2" data-level="2"/>
        <circle class="data-point" cx="511.64" cy="555.71" r="9" data-axis="2" data-level="3"/>
        <circle class="data-point" cx="547" cy="602.25" r="9" data-axis="2" data-level="4"/>
        
        <!-- 轴线3：左下方向 -->
        <circle class="data-point" cx="400" cy="400" r="9" data-axis="3" data-level="0"/>
        <circle class="data-point" cx="358.84" cy="456.63" r="9" data-axis="3" data-level="1"/>
        <circle class="data-point" cx="323.56" cy="505.17" r="9" data-axis="3" data-level="2"/>
        <circle class="data-point" cx="288.36" cy="555.71" r="9" data-axis="3" data-level="3"/>
        <circle class="data-point" cx="253" cy="602.25" r="9" data-axis="3" data-level="4"/>
        
        <!-- 轴线4：左上方向 -->
        <circle class="data-point" cx="400" cy="400" r="9" data-axis="4" data-level="0"/>
        <circle class="data-point" cx="333.45" cy="378.45" r="9" data-axis="4" data-level="1"/>
        <circle class="data-point" cx="276.37" cy="359.83" r="9" data-axis="4" data-level="2"/>
        <circle class="data-point" cx="219.31" cy="341.29" r="9" data-axis="4" data-level="3"/>
        <circle class="data-point" cx="162.25" cy="322.75" r="9" data-axis="4" data-level="4"/>
      </g>
      
      <!-- 雷达图数据区域（填充+连线） -->
      
    </svg>
    
    <!-- 控制面板 -->
    <!-- <div class="controls">
      <div class="level-control">
        <label for="current-level">当前等级:</label>
        <input type="number" id="current-level" min="0" max="4" value="1">
      </div>
      <div class="level-control">
        <label for="axis-levels">各轴线等级:</label>
        <input type="text" id="axis-levels" placeholder="例如: 1,2,1,3,2" value="1,1,1,1,1">
      </div>
    </div> -->
  </div>

  <!-- <script>
    // 雷达图数据管理
    class RadarChart {
      constructor() {
        this.currentLevel = 1;
        this.axisLevels = [1, 1, 1, 1, 1]; // 5条轴线的等级
        this.init();
      }
      
      init() {
        this.bindEvents();
        this.updateChart();
      }
      
      bindEvents() {
        const levelInput = document.getElementById('current-level');
        const axisInput = document.getElementById('axis-levels');
        
        levelInput.addEventListener('input', (e) => {
          this.currentLevel = parseInt(e.target.value) || 0;
          this.updateChart();
        });
        
        axisInput.addEventListener('input', (e) => {
          const values = e.target.value.split(',').map(v => parseInt(v.trim()) || 0);
          if (values.length === 5) {
            this.axisLevels = values;
            this.updateChart();
          }
        });
        
        // 点击数据点事件
        document.querySelectorAll('.data-point').forEach(point => {
          point.addEventListener('click', (e) => {
            const axis = parseInt(e.target.dataset.axis);
            const level = parseInt(e.target.dataset.level);
            console.log(`点击了轴线${axis}的等级${level}点位`);
          });
        });
      }
      
      updateChart() {
        this.updateDataPoints();
        this.updateFillArea();
      }
      
      updateDataPoints() {
        document.querySelectorAll('.data-point').forEach(point => {
          const axis = parseInt(point.dataset.axis);
          const level = parseInt(point.dataset.level);
          const axisLevel = this.axisLevels[axis];
          
          // 移除所有状态类
          point.classList.remove('active', 'completed', 'locked');
          
          if (level === 0) {
            // 中心点始终激活
            point.classList.add('active');
          } else if (level <= axisLevel) {
            // 已达到的等级
            point.classList.add('completed');
          } else {
            // 未达到的等级
            point.classList.add('locked');
          }
        });
      }
      
      updateFillArea() {
        const dataPath = document.getElementById('radar-data');
        const points = [];
        
        // 收集需要连接的点位坐标
        for (let axis = 0; axis < 5; axis++) {
          const level = this.axisLevels[axis];
          const point = document.querySelector(`[data-axis="${axis}"][data-level="${level}"]`);
          if (point) {
            points.push(`${point.cx.baseVal.value},${point.cy.baseVal.value}`);
          }
        }
        
        if (points.length === 5) {
          // 创建闭合路径（同时实现填充和连线）
          const pathData = `M ${points[0]} L ${points.slice(1).join(' L ')} Z`;
          dataPath.setAttribute('d', pathData);
        }
      }
    }
    
    // 初始化雷达图
    const radarChart = new RadarChart();
  </script>
</body>
</html>
