<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box {
            width: 285px;
            background: linear-gradient(180deg, #A99DFF, #CCA4FF);
            border-radius: 20px;
            font-weight: 500;
            font-size: 18px;
            color: #FFFFFF;
            line-height: 26px;
            text-align: center;
            /* padding: 3px 0 3px 8px; */
            height: fit-content;
            white-space: normal;
            word-break: break-all;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 4;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
    <div class="box">你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好你好好你好你好你好你好你好</div>
    <script>
        const box = document.querySelector('.box');
        console.log(box.scrollHeight);
        console.log(box.offsetHeight);
    </script>
</body>
</html>
