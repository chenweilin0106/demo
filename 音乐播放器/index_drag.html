<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <link rel="stylesheet" href="./index_drag.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- <script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script> -->
  <title>Music Player</title>
</head>
<body>
  <div class="container">
    <audio src=" " id="music"></audio>
    <div class="music-details">
      <h4 class="music-name"></h4>
      <div class="artist-name"></div>
      <div class="progress-area">
        <div class="progress-bar"></div>
        <div class="progress-point"></div>
      </div>
      <span class="current-time">0:00</span>
      <span class="total-time">0:00</span>
    </div>
    <div class="music-img-box">
      <div class="center-dot"></div>
      <div class="music-img"><img src=" " alt=""></div>
    </div>
    <div class="btns-box">
      <div class="btns">
        <button><i class="material-icons fast_rewind">fast_rewind</i></button>
        <button class="play-pause-btn pause"><i class="material-icons">play_arrow</i></button>
        <button><i class="material-icons fast_forward">fast_forward</i></button>
      </div>
    </div>
  </div>
  <script>
    // new VConsole({ defaultPlugins: ['system'] });
  </script>
  <script src="./data.js"></script>
  <script src="./index_drag.js"></script>
</body>
</html>
