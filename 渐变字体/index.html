<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- <script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script> -->
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      width: 100%;
      height: 100%;
    }
    body {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    :root {
      --stroke: 4.3px; /* 描边宽度 建议不要看蓝湖 因为text-stroke会向字体内部延申 所以宽度不准确 和效果图类似即可 */
    }
    .text {
      position: relative;
      z-index: 1;
      font-size: 50px;
      font-weight: bold;
      white-space: nowrap; /* 防止换行 */
      /* line-height: 100%; */
    }
    .p1 {
      position: relative;
      z-index: 2;
      color: transparent; /* 字体颜色透明 只保留描边 */
      background: -webkit-linear-gradient(0deg, white, black); /* 渐变背景 */
      padding: var(--stroke); /* 为描边预留位置 加上描边大小 防止字体被溢出隐藏 */
      -webkit-background-clip: text; /* 背景裁剪成字体 */
    }
    .text::after {
      content: attr(text);
      position: absolute;
      z-index: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: var(--stroke); /* 为描边预留位置 加上描边大小 防止描边被溢出隐藏 */
      color: transparent; /* 字体颜色透明 只保留描边 */
      -webkit-text-stroke: var(--stroke) transparent; /* 字体描边 为渐变背景占位 背景会覆盖在描边上 */
      background-image: -webkit-linear-gradient(0deg, pink, skyblue); /* 渐变背景 */
      -webkit-background-clip: text;
      background-size: 100% 100%; /* 下，右出现缝隙请调整 */
      background-position: 0% 1px; /* 上，左出现缝隙请调整 */
      background-repeat: no-repeat;
    }
  </style>
</head>
<body>
  <div class="text" text="123wwwwww5">
    <div class="p1">123wwwwww5</div>
  </div>
  <script>
    // new VConsole({ defaultPlugins: ['system'] });
  </script>
</body>
</html>
