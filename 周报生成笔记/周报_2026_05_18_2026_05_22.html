<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>周报（2026-05-18 ~ 2026-05-22）</title>
  </head>
  <body>
    <p>使用方式：点击“复制（不带字体）”后，直接到钉钉日志里粘贴。</p>
    <p><button id="copy">复制（不带字体）</button></p>

    <div id="copy-source">
      <ol id="weekly">
        <li>
          520活动
          <ol>
            <li>
              真爱榜单
              <ol>
                <li>修复文本错误</li>
              </ol>
            </li>
            <li>
              接口对接
              <ol>
                <li>补充接口注释</li>
              </ol>
            </li>
          </ol>
        </li>
        <li>
          开局既巅峰
          <ol>
            <li>
              霸业储备
              <ol>
                <li>新增资源领取数量文本逻辑</li>
              </ol>
            </li>
          </ol>
        </li>
        <li>
          六一活动
          <ol>
            <li>
              首页
              <ol>
                <li>去除倒计时处理</li>
              </ol>
            </li>
            <li>
              消费有礼
              <ol>
                <li>去除重置角标</li>
              </ol>
            </li>
            <li>
              荣誉社员
              <ol>
                <li>补充我的排名样式</li>
              </ol>
            </li>
            <li>
              问题修复
              <ol>
                <li>修复缓存tab图片</li>
              </ol>
            </li>
            <li>
              接口对接
              <ol>
                <li>补充接口注释</li>
              </ol>
            </li>
          </ol>
        </li>
      </ol>
    </div>

    <script>
      const copySource = document.getElementById("copy-source");
      const weeklyList = document.getElementById("weekly");
      const copyButton = document.getElementById("copy");

      function toPlainText(element) {
        const lines = [];
        const walk = (node, level) => {
          if (node.nodeName === "LI") {
            const textNodes = [];
            for (const child of node.childNodes) {
              if (child.nodeType === Node.TEXT_NODE) {
                const t = child.nodeValue.replace(/\s+/g, " ").trim();
                if (t) textNodes.push(t);
              } else if (
                child.nodeType === Node.ELEMENT_NODE &&
                child.nodeName !== "OL"
              ) {
                const t = child.textContent.replace(/\s+/g, " ").trim();
                if (t) textNodes.push(t);
              }
            }
            const text = textNodes.join(" ").trim();
            if (text) {
              lines.push("  ".repeat(level) + text);
            }
            const childOl = node.querySelector(":scope > ol");
            if (childOl) {
              for (const childLi of childOl.children) {
                if (childLi.nodeName === "LI") walk(childLi, level + 1);
              }
            }
            return;
          }

          if (node.nodeName === "OL") {
            for (const child of node.children) {
              if (child.nodeName === "LI") walk(child, level);
            }
          }
        };
        walk(element, 0);
        return lines.join("\n");
      }

      function setClipboard(event) {
        // 复制时生成“紧凑HTML”：避免缩进/换行产生的空白文本节点被部分编辑器当作空行处理
        const buildCompactHtml = () => {
          const esc = (s) =>
            String(s)
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;");

          const olType = (depth) => {
            const mod = (depth - 1) % 3;
            if (mod === 0) return "1";
            if (mod === 1) return "a";
            return "i";
          };

          const liText = (li) => {
            const parts = [];
            for (const child of li.childNodes) {
              if (child.nodeType === Node.TEXT_NODE) {
                const t = child.nodeValue.replace(/\s+/g, " ").trim();
                if (t) parts.push(t);
              } else if (
                child.nodeType === Node.ELEMENT_NODE &&
                child.nodeName !== "OL"
              ) {
                const t = child.textContent.replace(/\s+/g, " ").trim();
                if (t) parts.push(t);
              }
            }
            return parts.join(" ").trim();
          };

          const renderOl = (ol, depth) => {
            const type = olType(depth);
            let html = `<ol type="${type}" style="margin:0;padding-left:1.6em;">`;
            for (const li of ol.children) {
              if (li.nodeName !== "LI") continue;
              const text = liText(li);
              html += "<li>" + esc(text);
              const childOl = li.querySelector(":scope > ol");
              if (childOl) html += renderOl(childOl, depth + 1);
              html += "</li>";
            }
            html += "</ol>";
            return html;
          };

          return renderOl(weeklyList, 1);
        };

        const html = buildCompactHtml();
        const text = toPlainText(weeklyList);

        window.__lastCopiedHtml = html;
        window.__lastCopiedText = text;

        event.clipboardData.setData("text/html", html);
        event.clipboardData.setData("text/plain", text);
        event.preventDefault();
      }

      function selectionInside(node) {
        const sel = document.getSelection();
        if (!sel || sel.rangeCount === 0) return false;
        const range = sel.getRangeAt(0);
        let common = range.commonAncestorContainer;
        if (common.nodeType === Node.TEXT_NODE) common = common.parentNode;
        return node.contains(common);
      }

      let forceCopy = false;
      document.addEventListener("copy", (event) => {
        if (!event.clipboardData) return;
        if (forceCopy || selectionInside(copySource)) setClipboard(event);
      });

      copyButton.addEventListener("click", () => {
        forceCopy = true;
        const range = document.createRange();
        range.selectNodeContents(copySource);
        const sel = document.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand("copy");
        sel.removeAllRanges();
        forceCopy = false;
      });
    </script>
  </body>
</html>
