<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-color: grey;
        }
        .box{
            width: 30vw;
            height: 12vw;
            border-radius: 300vw;
            /* font-size: 28px; */
            -webkit-background-clip: content-box, padding-box;
            -webkit-background-origin: content-box, padding-box;
            background-image: linear-gradient(0deg, #cae7ff, #ffffff), -webkit-linear-gradient(#fff, #fff);
            padding: 0.5vw;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
            flex-shrink: 0;
            pointer-events: auto;
            margin: 15px 0;
            white-space: nowrap;
            color: blue;
        }
    </style>
</head>
<body>
    <div class="box">领取</div>
</body>
</html>
