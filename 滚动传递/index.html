<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    ::-webkit-scrollbar {
      display: none;
      width: 0;
      -webkit-overflow-scrolling: touch;
    }
    .father {
      width: 100vw;
      height: 100vh;
      overflow-x: hidden;
      overflow-y: scroll;
      background-color: skyblue;
      padding: 30px;
    }
    .son {
      width: 100%;
      height: 90vh;
      background-color: red;
      overflow-x: hidden;
      overflow-y: scroll;
      /* overscroll-behavior: none; */
    }
    .box {
      width: 100%;
      height: 200px;
      background-color: purple;
      margin-bottom: 20px;
    }
    .box:last-child {
      margin-bottom: 0;
    }
    .topBox {
      width: 100%;
      height: 500px;
      background-color: pink;
    }
    .bottomBox {
      width: 100%;
      height: 500px;
      background-color: green;
    }
  </style>
</head>
<body>
  <div class="father">
    <div class="topBox"></div>
    <div class="son">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <div class="bottomBox"></div>
  </div>
</body>
</html>
