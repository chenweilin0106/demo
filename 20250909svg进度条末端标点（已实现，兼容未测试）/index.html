<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蛇形进度条</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Arial", sans-serif;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        /* padding: 40px; */
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 800px;
        height: 800px;
      }

      .title {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
        font-size: 2.5em;
        font-weight: 300;
      }

      .snake-progress {
        position: relative;
        width: 800px;
        height: 800px;
        /* margin: 40px 0; */
      }

      .snake-path {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .path-line-outline {
        fill: none;
        stroke: pink;
        stroke-width: 12;
        stroke-linecap: round;
      }
      .path-line {
        fill: none;
        stroke: #e0e0e0;
        stroke-width: 8;
        stroke-linecap: round;
      }

      .progress-line {
        fill: none;
        stroke: url(#progressGradient);
        stroke-width: 8;
        stroke-linecap: round;
        /* stroke-linecap: butt; */
        /* stroke-linejoin: round; */
        /* filter: drop-shadow(0 0 2px #000) drop-shadow(0 0 1px #000); */
        /* transition: stroke-dashoffset 0.5s ease-in-out; */
      }
      .controls {
        text-align: center;
        margin-top: 20px;
      }

      .progress-slider {
        width: 300px;
        margin: 0 10px;
      }

      .marker-controls {
        margin-top: 15px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 8px;
      }

      .marker-controls label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .radio-label {
        display: inline-block !important;
        margin-right: 15px;
        margin-bottom: 5px !important;
        font-weight: normal !important;
        cursor: pointer;
      }

      .radio-label input[type="radio"] {
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- <h1 class="title">🐍 蛇形进度条</h1> -->
      <div class="snake-progress">
        <svg class="snake-path" viewBox="0 0 800 800">
          <!-- 定义渐变 -->
          <defs>
            <!-- 基础渐变 -->
            <linearGradient
              id="progressGradient"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="0%"
            >
              <stop offset="0%" style="stop-color: #ff6b6b; stop-opacity: 1" />
              <stop offset="25%" style="stop-color: #ffd93d; stop-opacity: 1" />
              <stop offset="50%" style="stop-color: #6bcf7f; stop-opacity: 1" />
              <stop offset="75%" style="stop-color: #4d9de0; stop-opacity: 1" />
              <stop
                offset="100%"
                style="stop-color: #9b59b6; stop-opacity: 1"
              />
            </linearGradient>
          </defs>
          <path class="path-line-outline" />
          <path class="path-line" />
          <path class="progress-line" />
          <circle id="progress-marker" r="8" fill="#ff6b6b" style="opacity: 0;" />
        </svg>
      </div>
      <div class="controls">
        <label for="progress-slider"
          >进度: <span id="progress-value">0%</span></label
        >
        <input
          type="range"
          id="progress-slider"
          class="progress-slider"
          min="0"
          max="100"
          value="0"
        />
        
        <div class="marker-controls">
          <label>标点显示:</label>
          <label class="radio-label">
            <input type="radio" name="marker-display" value="always" checked>
            始终显示
          </label>
          <label class="radio-label">
            <input type="radio" name="marker-display" value="progress-only">
            仅进度时显示
          </label>
        </div>
      </div>
    </div>
    <script>
      const pathArray = [
        "M 100 50",
        "L 300 50",
        "L 500 50",
        "L 650 50",
        "Q 700 50 700 100",
        "L 700 150",
        "Q 700 200 650 200",
        "L 500 200",
        "L 300 200",
        "L 150 200",
        "Q 100 200 100 250",
        "L 100 300",
        "Q 100 350 150 350",
        "L 300 350",
        "L 500 350",
        "L 700 350",
      ];
      const pathString = pathArray.map((item) => item).join(" ");
      const pathLine = document.querySelector(".path-line");
      pathLine.setAttribute("d", pathString);
      const path = document.querySelector(".progress-line");
      path.setAttribute("d", pathString);
      const pathLineOutline = document.querySelector(".path-line-outline");
      pathLineOutline.setAttribute("d", pathString);
      // 获取路径总长度
      const totalLength = path.getTotalLength();

      // 设置初始状态
      path.style.strokeDasharray = totalLength;
      path.style.strokeDashoffset = totalLength;
      requestAnimationFrame(() => {
        path.style.transition = "stroke-dashoffset 0.5s ease-in-out";
      });

      // 进度控制
      const slider = document.getElementById("progress-slider");
      const progressValue = document.getElementById("progress-value");
      const marker = document.getElementById("progress-marker");
      const markerDisplayRadios = document.querySelectorAll('input[name="marker-display"]');

      // 动画控制变量
      let currentMarkerProgress = 0;
      let targetMarkerProgress = 0;
      let markerAnimationId = null;
      const markerAnimationDuration = 500; // 与进度条动画时长一致
      let markerAnimationStartTime = 0;
      let markerAnimationStartProgress = 0; // 动画开始时的进度值

      // 路径追踪动画函数
      function animateMarkerAlongPath() {
        const currentTime = Date.now();
        const elapsed = currentTime - markerAnimationStartTime;
        const progress = Math.min(elapsed / markerAnimationDuration, 1);
        
        // 使用缓动函数 (ease-in-out)
        const easeProgress = progress < 0.5 
          ? 2 * progress * progress 
          : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        // 计算当前应该到达的路径位置
        const currentProgress = markerAnimationStartProgress + (targetMarkerProgress - markerAnimationStartProgress) * easeProgress;
        const pathLength = (currentProgress / 100) * totalLength;
        
        // TODO 获取路径上的精确位置（getPointAtLength 获取路径上的精确位置）
        const point = path.getPointAtLength(pathLength);
        marker.setAttribute("cx", point.x);
        marker.setAttribute("cy", point.y);
        
        // 如果动画未完成，继续下一帧
        if (progress < 1) {
          markerAnimationId = requestAnimationFrame(animateMarkerAlongPath);
        } else {
          // 动画完成，更新当前进度
          currentMarkerProgress = Number(targetMarkerProgress);
          markerAnimationId = null;
        }
      }

      // 更新标点位置的函数
      function updateMarkerPosition(percentage) {
        // 如果当前有动画在进行，取消它
        if (markerAnimationId) {
          cancelAnimationFrame(markerAnimationId);
          markerAnimationId = null;
        }
        
        // 设置新的目标进度和动画起始点
        targetMarkerProgress = Number(percentage);
        markerAnimationStartProgress = Number(currentMarkerProgress);
        markerAnimationStartTime = Date.now();
        
        // 开始新的动画
        animateMarkerAlongPath();
      }

      // 更新标点可见性
      function updateMarkerVisibility(percentage) {
        const displayMode = document.querySelector('input[name="marker-display"]:checked').value;
        
        if (displayMode === "always") {
          marker.style.opacity = "1";
        } else if (displayMode === "progress-only") {
          if (percentage > 0) {
            marker.style.opacity = "1";
          } else {
            marker.style.opacity = "0";
          }
        }
      }

      slider.addEventListener("input", function () {
        const percentage = this.value;
        const progress = (percentage / 100) * totalLength;
        const offset = totalLength - progress;
        path.style.strokeDashoffset = offset;
        progressValue.textContent = percentage + "%";
        
        // 更新标点位置和可见性
        updateMarkerPosition(percentage);
        updateMarkerVisibility(percentage);
      });

      // 监听单选按钮变化
      markerDisplayRadios.forEach(radio => {
        radio.addEventListener("change", function() {
          const percentage = parseInt(slider.value);
          updateMarkerVisibility(percentage);
        });
      });

      // 初始化标点位置和可见性
      updateMarkerPosition(0);
      updateMarkerVisibility(0);
    </script>
  </body>
</html>
