<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
    }

    #box {
      width: 375px;
      display: flex;
      justify-content: space-between;
    }

    #box img {
      object-fit: cover;
      background-color: #eee;
      margin-bottom: 10px;
    }

    #left-box,
    #right-box {
      width: 180px;
    }

    .loader-box {
      width: 375px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #loader {
      width: 25px;
      height: 25px;
      border: 3px solid #ddd;
      border-radius: 50%;
      border-bottom: 3px solid #717171;
      transform: rotate(0deg);
      animation: loading 1s linear infinite;
    }

    @keyframes loading {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <div id="box">
    <div id="left-box"></div>
    <div id="right-box"></div>
  </div>
  <div class="loader-box">
    <div id="loader"></div>
    <div id="nothing" class="hidden">没有更多了~</div>
  </div>
  <script>
    const box = document.getElementById("box"),
      leftBox = document.getElementById("left-box"),
      rightBox = document.getElementById("right-box"),
      loader = document.getElementById("loader"),
      nothing = document.getElementById("nothing");

    let hasMore = true,
      loadLock = false;

    const colWidth = 180;

    loadData();

    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          pullUp();
        }
      },
      {
        root: null,
        rootMargin: "0px",
        threshold: 0
      }
    );

    observer.observe(loader);

    function loadData () {
      const items = getItems(10);
      createImgs(items, colWidth, 10);
    }

    function pullUp () {
      if (!hasMore) {
        return;
      }

      if (loadLock) {
        return;
      }

      setTimeout(() => {
        const len = leftBox.children.length + rightBox.children.length;
        loadLock = true;
        if (len > 30) {
          loader.className = "hidden";
          nothing.className = "";
          hasMore = false;
          return;
        }

        loadData();
        loadLock = false;
      }, 1000);
    }

    // 随机生成宽在 300~400，高在 250~500 的图片
    function getItems (len) {
      const items = [];
      for (let i = 0; i < len; i++) {
        const width = Math.floor(Math.random() * (400 - 300 + 1) + 300);
        const height = Math.floor(Math.random() * (500 - 250 + 1) + 250);
        let url = `
          data:image/svg+xml;charset=utf-8,
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="${width}"
            height="${height}"
            viewBox="0 0 ${width} ${height}"
          >
            <text
              x="50%"
              y="50%"
              dominant-baseline="middle"
              text-anchor="middle"
              font-size="20"
              fill="black"
            >
              ${width} * ${height}
            </text>
          </svg>
        `;
        url = url
          .replace(/[\r\n]+/g, "")
          .replace(/\s+/g, " ")
          .trim();
        items.push({ width, height, url });
      }
      return items;
    }

    function createImgs (items, imgWidth, rowSpace) {
      let leftHeight = 0,
        rightHeight = 0;
      for (let i = 0; i < items.length; i++) {
        const { width: w, height: h, url } = items[i];
        const img = document.createElement("img");
        const ratio = imgWidth / w;
        const imgHeight = Math.floor(h * ratio);
        img.width = imgWidth;
        img.height = imgHeight;
        img.src = url;

        if (leftHeight <= rightHeight) {
          leftHeight = leftHeight + imgHeight + rowSpace;
          leftBox.appendChild(img);
        } else {
          rightHeight = rightHeight + imgHeight + rowSpace;
          rightBox.appendChild(img);
        }
      }
    }
  </script>
</body>

</html>
