<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蛇形进度条</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: "Arial", sans-serif;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        /* padding: 40px; */
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 800px;
        height: 800px;
      }

      .title {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
        font-size: 2.5em;
        font-weight: 300;
      }

      .snake-progress {
        position: relative;
        width: 800px;
        height: 800px;
        /* margin: 40px 0; */
      }

      .snake-path {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .path-line-outline {
        fill: none;
        stroke: pink;
        stroke-width: 12;
        stroke-linecap: round;
      }
      .path-line {
        fill: none;
        stroke: #e0e0e0;
        stroke-width: 8;
        stroke-linecap: round;

      }

      .progress-line {
        fill: none;
        stroke: url(#progressGradient);
        stroke-width: 8;
        stroke-linecap: round;
        /* stroke-linecap: butt; */
        /* stroke-linejoin: round; */
        /* filter: drop-shadow(0 0 2px #000) drop-shadow(0 0 1px #000); */
        /* transition: stroke-dashoffset 0.5s ease-in-out; */
      }
      .controls {
        text-align: center;
        margin-top: 20px;
      }

      .progress-slider {
        width: 300px;
        margin: 0 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- <h1 class="title">🐍 蛇形进度条</h1> -->
      <div class="snake-progress">
        <svg class="snake-path" viewBox="0 0 800 800">
          <!-- 定义渐变 -->
          <defs>
            <!-- 基础渐变 -->
            <linearGradient
              id="progressGradient"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="0%"
            >
              <stop offset="0%" style="stop-color: #ff6b6b; stop-opacity: 1" />
              <stop offset="25%" style="stop-color: #ffd93d; stop-opacity: 1" />
              <stop offset="50%" style="stop-color: #6bcf7f; stop-opacity: 1" />
              <stop offset="75%" style="stop-color: #4d9de0; stop-opacity: 1" />
              <stop
                offset="100%"
                style="stop-color: #9b59b6; stop-opacity: 1"
              />
            </linearGradient>

            <!-- 彩虹渐变 -->
            <linearGradient
              id="rainbowGradient"
              x1="0%"
              y1="0%"
              x2="100%"
              y2="0%"
            >
              <stop offset="0%" style="stop-color: #ff0000; stop-opacity: 1" />
              <stop
                offset="16.66%"
                style="stop-color: #ff8000; stop-opacity: 1"
              />
              <stop
                offset="33.33%"
                style="stop-color: #ffff00; stop-opacity: 1"
              />
              <stop offset="50%" style="stop-color: #00ff00; stop-opacity: 1" />
              <stop
                offset="66.66%"
                style="stop-color: #0080ff; stop-opacity: 1"
              />
              <stop
                offset="83.33%"
                style="stop-color: #8000ff; stop-opacity: 1"
              />
              <stop
                offset="100%"
                style="stop-color: #ff0080; stop-opacity: 1"
              />
            </linearGradient>

            <!-- 蓝色渐变 -->
            <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color: #74b9ff; stop-opacity: 1" />
              <stop offset="50%" style="stop-color: #0984e3; stop-opacity: 1" />
              <stop
                offset="100%"
                style="stop-color: #2d3436; stop-opacity: 1"
              />
            </linearGradient>
          </defs>
          <path class="path-line-outline" />
          <path class="path-line" />
          <path class="progress-line" />
        </svg>
      </div>
      <div class="controls">
        <label for="progress-slider"
          >进度: <span id="progress-value">0%</span></label
        >
        <input
          type="range"
          id="progress-slider"
          class="progress-slider"
          min="0"
          max="100"
          value="0"
        />
      </div>
    </div>
    <script>
      // M 100 50 L 300 50 L 500 50 L 700 50 Q 750 50 750 100 L 750 150 Q 750 200 700 200 L 500 200 L 300 200 L 100 200 Q 50 200 50 250 L 50 300 Q 50 350 100 350 L 300 350 L 500 350 L 700 350"
      const pathArray = [
        "M 100 50",
        "L 300 50",
        "L 500 50",
        "L 650 50",
        "Q 700 50 700 100",
        "L 700 150",
        "Q 700 200 650 200",
        "L 500 200",
        "L 300 200",
        "L 150 200",
        "Q 100 200 100 250",
        "L 100 300",
        "Q 100 350 150 350",
        "L 300 350",
        "L 500 350",
        "L 700 350",
      ];
      const pathString = pathArray.map((item) => item).join(" ");
      const pathLine = document.querySelector(".path-line");
      pathLine.setAttribute("d", pathString);
      const path = document.querySelector(".progress-line");
      path.setAttribute("d", pathString);
      const pathLineOutline = document.querySelector(".path-line-outline");
      pathLineOutline.setAttribute("d", pathString);
      // 获取路径总长度
      const totalLength = path.getTotalLength();

      // 设置初始状态
      path.style.strokeDasharray = totalLength;
      path.style.strokeDashoffset = totalLength / 2;
      requestAnimationFrame(() => {
        path.style.transition = "stroke-dashoffset 0.5s ease-in-out";
      });

      // 进度控制
      const slider = document.getElementById("progress-slider");
      const progressValue = document.getElementById("progress-value");

      slider.addEventListener("input", function () {
        const percentage = this.value;
        const progress = (percentage / 100) * totalLength;
        const offset = totalLength - progress;
        path.style.strokeDashoffset = offset;
        progressValue.textContent = percentage + "%";
      });
    </script>
  </body>
</html>
