<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUI使用</title>
</head>

<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
  <script>
    // Creating a GUI with options.
    const gui = new dat.GUI({ name: 'My GUI' });
    const folder = gui.addFolder('Flow Field');
    const options = { rotationSpeed: 0.01, color: '#fff', envMap: 'HDR', wireframe: false }
    // 写法1
    // folder.add(options, 'rotationSpeed', 0.01, 0.1, 0.01)
    //写法2
    folder.add(options, 'rotationSpeed').min(0.01).max(0.1).step(0.01)
    folder.addColor(options, 'color') // 颜色选择器
    folder.add(options, 'envMap', ['HDR', 'LDR']) // 下拉选择器
    folder.add(options, 'wireframe') // 勾选框
    folder.open(); // 默认展开
  </script>
</body>

</html>
