<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>半屏滚动兼容</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: scroll;
            position: relative;
            z-index: 1;
            background-color: pink;
        }
        .box {
            width: 100%;
            height: 100px;
            margin-bottom: 20px;
            background-color: skyblue;
        }
        .box:last-child {
            margin-bottom: 0;
        }
        .scrollBox {
            width: 100%;
            height: 400px;
            background-color: yellow;
            overflow-x: hidden;
            overflow-y: scroll;
            margin-bottom: 20px;
        }
        .scrollBox > .box {
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="scrollBox">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
        <div class="box"></div>
    </div>
</body>
</html>
