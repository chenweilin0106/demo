<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box, .container {
            width: 100px;
            height: 100px;
        }
        .box {
            /* background-color: red; */
            background-image: -webkit-linear-gradient(to bottom, #fff, #000);
        }
        .container {
            margin-top: 50px;
            /* background-color: green; */
            background-image: linear-gradient(to bottom, #fff, #000);
        }
    </style>
</head>
<body>
    <div class="box"></div>
    <div class="container"></div>
</body>
</html>
