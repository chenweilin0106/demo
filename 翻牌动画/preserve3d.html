<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    @keyframes flip {
      0% {
        transform: rotateY(0);
      }

      100% {
        transform: rotateY(180deg);
      }
    }

    .box {
      transform-style: preserve-3d;
      position: relative;
      height: 300px;
      width: 278px;
      /* border: 1px solid #000; */
    }

    .front {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      background-color: #cb0d15;
      color: #fff;
    }

    .back {
      opacity: 0;
      position: absolute;
      backface-visibility: hidden;
      width: 100%;
      height: 100%;
      background-color: #0e0d0d;
      color: #fff;
      transform: rotateY(180deg);
    }

    .box:hover {
      animation: flip 0.6s forwards;
    }

    @keyframes show {
      100% {
        opacity: 1;
      }
    }

    .box:hover>.back {
      animation: show 0.6s 1s forwards;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="front">
      正面
    </div>
    <div class="back">
      反面
    </div>
  </div>
</body>

</html>
