<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>scrollAlignTo demo（开发中）</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111a33;
      --text: #e6eaf2;
      --muted: #93a1c6;
      --line: rgba(255,255,255,.12);
      --btn: #2b5cff;
      --btn2: #2aa36b;
    }

    body {
      margin: 0;
      padding: 18px;
      background: radial-gradient(1200px 600px at 20% 0%, #13204c 0%, var(--bg) 55%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 14px;
      align-items: start;
    }

    .card {
      background: rgba(17, 26, 51, .9);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    .card h2 {
      font-size: 14px;
      margin: 0 0 10px;
      color: var(--muted);
      font-weight: 600;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    input, select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline: none;
    }

    input[type="checkbox"] { width: auto; }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 6px 0 2px;
    }

    .checks label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0;
      color: var(--text);
      font-size: 12px;
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      color: white;
      cursor: pointer;
      background: var(--btn);
    }

    button.secondary { background: var(--btn2); }
    button.ghost { background: rgba(255,255,255,.12); }

    .demoWrap {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 10px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
    }

    #styleInfo {
      font-size: 12px;
      color: #c8d2ff;
      margin-top: 6px;
      white-space: pre-wrap;
    }

    #container {
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      position: relative;
    }

    #container.horizontal {
      width: 640px;
      height: 120px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
    }

    #container.vertical {
      width: 280px;
      height: 420px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .item {
      box-sizing: border-box;
      background: rgba(255,255,255,.08);
      border-radius: 10px;
      color: var(--text);
      align-items: center;
      justify-content: center;
      font-size: 12px;
      user-select: none;
    }

    .item:nth-child(5n) { background: rgba(43, 92, 255, .22); }
    .item:nth-child(5n+1) { background: rgba(42, 163, 107, .22); }

    .out {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    pre {
      margin: 0;
      padding: 10px;
      border-radius: 12px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      color: #e9ecff;
      overflow: auto;
      max-height: 300px;
    }

    .line {
      font-size: 12px;
      color: #e9ecff;
      padding: 6px 0;
      border-bottom: 1px dashed rgba(255,255,255,.14);
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      #container.horizontal { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>scrollAlignTo demo（开发中）</h1>
  <div class="grid">
    <div class="card">
      <h2>参数</h2>

      <div class="row">
        <div>
          <label>direction</label>
          <select id="direction">
            <option value="h" selected>h（横向）</option>
            <option value="v">v（纵向）</option>
          </select>
        </div>
        <div>
          <label>align</label>
          <select id="align">
            <option value="start" selected>start</option>
            <option value="center">center</option>
            <option value="end">end</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label>targetIndex</label>
          <select id="targetIndex"></select>
        </div>
        <div>
          <label>behavior</label>
          <select id="behavior">
            <option value="smooth" selected>smooth</option>
            <option value="auto">auto</option>
          </select>
        </div>
      </div>

      <div class="row">
        <div>
          <label>offset（支持字符串）</label>
          <input id="offset" value="0" />
        </div>
        <div>
          <label>clamp</label>
          <div class="checks">
            <label><input id="clamp" type="checkbox" checked /> clamp</label>
            <label><input id="debug" type="checkbox" /> debug</label>
          </div>
        </div>
      </div>

      <div class="checks">
        <label><input id="ignoreContainerPadding" type="checkbox" checked /> ignoreContainerPadding（默认）</label>
        <label><input id="ignoreElementMargin" type="checkbox" checked /> ignoreElementMargin（默认）</label>
        <label><input id="ignoreElementBorder" type="checkbox" checked /> ignoreElementBorder（默认）</label>
      </div>

      <h2 style="margin-top:12px">样式（start / end，支持不对称）</h2>

      <div class="row">
        <div>
          <label>container paddingStart</label>
          <input id="containerPaddingStart" value="16" />
        </div>
        <div>
          <label>container paddingEnd</label>
          <input id="containerPaddingEnd" value="32" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>container borderStart</label>
          <input id="containerBorderStart" value="2" />
        </div>
        <div>
          <label>container borderEnd</label>
          <input id="containerBorderEnd" value="8" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>element marginStart</label>
          <input id="elementMarginStart" value="10" />
        </div>
        <div>
          <label>element marginEnd</label>
          <input id="elementMarginEnd" value="4" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>element borderStart</label>
          <input id="elementBorderStart" value="6" />
        </div>
        <div>
          <label>element borderEnd</label>
          <input id="elementBorderEnd" value="2" />
        </div>
      </div>

      <div class="btns">
        <button id="applyStyle" class="ghost">应用样式并重置</button>
        <button id="random" class="ghost">随机选 item</button>
      </div>

      <div class="btns">
        <button id="scrollOnce">滚动一次</button>
        <button id="scrollTwice" class="secondary">滚动两次（验证稳定）</button>
        <button id="reset" class="ghost">重置滚动</button>
      </div>

      <div id="styleInfo"></div>
    </div>

    <div class="demoWrap">
      <div class="card">
        <h2>demo 容器</h2>
        <p class="hint">提示：先把 padding/margin/border 设置成不对称（例如 start=16 end=32），再切换 ignore 开关观察偏移。</p>
        <div id="container" class="horizontal"></div>
      </div>

      <div class="card out">
        <h2>结果</h2>
        <div id="resultLine" class="line"></div>
        <div id="resultLine2" class="line"></div>
        <pre id="debugOut"></pre>
        <pre id="debugOut2"></pre>
      </div>

      <div class="footer">参考：D:\Project\demo\MD\dom-scroll-metrics.md</div>
    </div>
  </div>

  <script src="./scrollAlignTo.js"></script>
  <script src="./app.js"></script>
</body>
</html>
