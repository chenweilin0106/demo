<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docu ment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box {
            width: 200px;
            height: 200px;
            background-color: red;
        }
        .top {
            height: 50%;
            background-color: blue;
            display: flex;
            align-items: center;
            justify-content: space-evenly;
        }
        .item {
            width: 30px;
            height: 30px;
            border: 1px solid black;
            background-color: #fff;
        }
        .bottom {
            height: 50%;
            background-color: green;
        }
        .line {
            width: 90%;
            height: 50%;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="top">
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
        <div class="bottom">
            <div class="line">line</div>
        </div>
    </div>
</body>
</html>
