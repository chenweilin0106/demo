<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SVG 雷达图 Demo</title>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./radar.js"></script>
  </head>
  <body>
    <div class="radar-wrap" aria-label="雷达图容器">
      <svg id="radar" viewBox="0 0 800 800" aria-label="雷达图"></svg>
    </div>

    <div class="controls" aria-label="演示控制区">
      <button id="btn-random" type="button">随机</button>
      <button id="btn-zero" type="button">清零</button>
      <span class="values" id="values"></span>
    </div>
  </body>
</html>
