<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --container-width: 472px; /* 容器宽度 */
            --item-width: 128px; /* 子元素宽度 */
            --n: 3; /* 每行显示的个数 */
            --gap: calc((var(--container-width) - var(--item-width) * var(--n)) / (var(--n) + 1)); /* 计算间距 */
        }
        .container {
            width: var(--container-width);
            background: #eee; /* 仅装饰 */
            margin: 50px auto; /* 仅装饰 */
            display: flex;
            flex-wrap: wrap;
            padding-bottom: var(--gap); /* 底部边距 仅装饰 */
        }
        .item {
            width: var(--item-width); /* 子元素宽度 */
            height: var(--item-width); /* 子元素高度 只为方便和宽度一致 仅装饰 */
            border: 1px solid #333; /* 边框 仅装饰 */
            margin: var(--gap) 0 0 var(--gap); /* 左的间距 上间距仅装饰 */
        }
        .item:nth-child(odd) {
            background: #046f4e;
        }
        .item:nth-child(even) {
            background: #d53b3b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
</body>
</html>
