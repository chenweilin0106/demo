<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVGAPlayer-Web-Lit</title>
  <script src="https://unpkg.com/svga/dist/index.min.js"></script>
  <style>
    #box {
      width: 204px;
      height: 48px;
    }
  </style>
</head>

<body>
  <canvas id="box"></canvas>
  <script type="module">
    const { Parser, Player } = SVGA

    const parser = new Parser()
    const svga = await parser.load('https://cdn-image.dandan818.com/activity/weekly/svga/liang_yl_purple.svga')

    const player = new Player(document.getElementById('box'))
    await player.mount(svga)

    player.onStart = () => console.log('onStart', player)
    player.onResume = () => console.log('onResume')
    player.onPause = () => console.log('onPause')
    player.onStop = () => console.log('onStop')
    // player.onProcess = () => console.log('onProcess', player.currentFrame)
    player.onEnd = () => console.log('onEnd')

    // 开始播放动画
    player.start()

    // 暂停播放动画
    // player.pause()

    // 继续播放动画
    // player.resume()

    // 停止播放动画
    // player.stop()

    // 清空动画
    // player.clear()

    // 销毁
    // parser.destroy()
    // player.destroy()
  </script>
</body>

</html>
