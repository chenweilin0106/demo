<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            width: 200px;
            height: 200px;
            transition: all 0.3s;
            background-color: pink;
            overflow: hidden;
        }
        .son {
            width: 100%;
            height: 50px;
            margin-bottom: 20px;
            background-color: skyblue;
        }
        .son:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="son"></div>
        <div class="son"></div>
        <div class="son"></div>
        <div class="son"></div>
        <div class="son"></div>
    </div>
    <script>
        const box = document.querySelector('.box');
        const originHeight = box.offsetHeight + 'px';
        box.addEventListener('mouseenter', () => {
            box.style.height = 'auto';
            const height = box.offsetHeight;
            box.style.height = originHeight;
            box.offsetHeight
            box.style.height = height + 'px'
        });
        box.addEventListener('mouseleave', () => {
            box.style.height = originHeight;
        });
    </script>
</body>
</html>
