<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #000;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .svgBox {
        width: 300px;
        height: 300px;
      }
    </style>
  </head>
  <body>
    <div class="svgBox">
      <svg width="100%" height="100%" viewBox="0 0 300 300">
        <!-- 渐变 -->
        <defs>
          <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #ff6b6b; stop-opacity: 1" />
            <stop offset="50%" style="stop-color: #45b7d1; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #85c71c; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <!-- 矩形 方便看居中效果 -->
        <rect
          x="0"
          y="0"
          width="100%"
          height="100%"
          fill="white"
          stroke="red"
          stroke-width="1"
        />
        <!-- 文字 -->
        <text
          x="50%"
          y="50%"
          dominant-baseline="central"
          text-anchor="middle"
          font-size="100"
          stroke="url(#textGradient)"
          stroke-width="8"
          paint-order="stroke"
          stroke-opacity="0.5"
        >
          TEXT
        </text>
      </svg>
    </div>
    <div class="svgBox">
      <svg width="100%" height="100%" viewBox="0 0 300 300">
        <!-- 渐变 -->
        <defs>
          <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color: #ff6b6b; stop-opacity: 1" />
            <stop offset="50%" style="stop-color: #45b7d1; stop-opacity: 1" />
            <stop offset="100%" style="stop-color: #85c71c; stop-opacity: 1" />
          </linearGradient>
        </defs>
        <!-- 矩形 方便看居中效果 -->
        <rect
          x="0"
          y="0"
          width="100%"
          height="100%"
          fill="white"
          stroke="red"
          stroke-width="1"
        />
        <!-- 文字描边 -->
        <text
          x="50%"
          y="50%"
          dominant-baseline="central"
          text-anchor="middle"
          font-size="100"
          stroke="url(#textGradient)"
          stroke-width="8"
          stroke-linejoin="round"
        >
          TEXT
        </text>
        <!-- 文字主体 -->
        <text
          x="50%"
          y="50%"
          font-size="100"
          dominant-baseline="central"
          text-anchor="middle"
        >
          TEXT
        </text>
      </svg>
    </div>
  </body>
</html>
